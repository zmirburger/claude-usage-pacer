<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude Usage Pacer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0b;
    --bg-elev: #131316;
    --fg: #e8e6e1;
    --fg-dim: #6b6862;
    --fg-faint: #2a2925;
    --accent: #f5a623;
    --accent-dim: #5a3d0a;
    --danger: #e85d4f;
    --safe: #6bb38a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'JetBrains Mono', monospace;
    font-feature-settings: "ss01", "ss02", "cv01";
    overflow: hidden;
  }

  body {
    background-image:
      radial-gradient(circle at 20% 10%, rgba(245,166,35,0.06), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(245,166,35,0.04), transparent 50%);
    background-attachment: fixed;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 24px;
    max-width: 720px;
    margin: 0 auto;
  }

  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-dim);
  }

  .topbar .brand { display: flex; gap: 8px; align-items: center; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); animation: pulse 2s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .settings-btn {
    background: none;
    border: 1px solid var(--fg-faint);
    color: var(--fg-dim);
    padding: 6px 10px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: all 0.2s;
  }
  .settings-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 40px;
  }

  .pct-section { text-align: center; }
  .pct-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--fg-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .pct-value {
    font-size: clamp(72px, 18vw, 144px);
    font-weight: 200;
    line-height: 1;
    letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
  }
  .pct-value .sym {
    font-size: 0.4em;
    color: var(--fg-dim);
    font-weight: 300;
    margin-left: 4px;
    vertical-align: super;
  }

  .progress-wrap {
    margin-top: 20px;
    height: 4px;
    background: var(--fg-faint);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #f7b948);
    box-shadow: 0 0 16px rgba(245,166,35,0.3);
    transition: width 1s linear;
    border-radius: 2px;
  }

  .countdown {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    padding: 24px;
    background: var(--bg-elev);
    border: 1px solid var(--fg-faint);
    border-radius: 4px;
  }
  .cd-unit { text-align: center; }
  .cd-num {
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 500;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
  }
  .cd-label {
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--fg-dim);
    margin-top: 4px;
  }

  .meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    font-size: 11px;
  }
  .meta-item {
    padding: 12px 16px;
    background: var(--bg-elev);
    border-left: 2px solid var(--accent-dim);
  }
  .meta-label {
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 9px;
    margin-bottom: 4px;
  }
  .meta-value {
    color: var(--fg);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }

  .footer {
    margin-top: 32px;
    font-size: 10px;
    color: var(--fg-dim);
    text-align: center;
    letter-spacing: 0.15em;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,11,0.85);
    backdrop-filter: blur(8px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
  }
  .overlay.open { display: flex; }
  .panel {
    background: var(--bg-elev);
    border: 1px solid var(--fg-faint);
    padding: 28px;
    width: 100%;
    max-width: 360px;
    border-radius: 4px;
  }
  .panel h2 {
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    font-weight: 500;
  }
  .field { margin-bottom: 16px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--fg-dim);
    margin-bottom: 6px;
  }
  .field select, .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--fg-faint);
    color: var(--fg);
    padding: 10px 12px;
    font-family: inherit;
    font-size: 13px;
  }
  .field select:focus, .field input:focus {
    outline: none;
    border-color: var(--accent);
  }
  .btn-row { display: flex; gap: 8px; margin-top: 20px; }
  .btn {
    flex: 1;
    padding: 10px;
    border: 1px solid var(--fg-faint);
    background: transparent;
    color: var(--fg);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
    font-weight: 600;
  }
  .btn:hover { opacity: 0.85; }

  .behind .pct-value { color: var(--safe); }
  .ahead .pct-value { color: var(--danger); }
</style>
</head>
<body>
<div class="container">
  <div class="topbar">
    <div class="brand">
      <span class="dot"></span>
      <span>Claude Usage Pacer</span>
    </div>
    <button class="settings-btn" onclick="toggleSettings()">⚙ Settings</button>
  </div>

  <main>
    <div class="pct-section">
      <div class="pct-label">Expected usage <span id="active-tag" style="opacity:0.6"></span></div>
      <div class="pct-value"><span id="pct">0.00</span><span class="sym">%</span></div>
      <div class="progress-wrap">
        <div class="progress-bar" id="bar" style="width: 0%"></div>
      </div>
    </div>

    <div class="countdown">
      <div class="cd-unit"><div class="cd-num" id="d">0</div><div class="cd-label">Days</div></div>
      <div class="cd-unit"><div class="cd-num" id="h">00</div><div class="cd-label">Hours</div></div>
      <div class="cd-unit"><div class="cd-num" id="m">00</div><div class="cd-label">Minutes</div></div>
      <div class="cd-unit"><div class="cd-num" id="s">00</div><div class="cd-label">Seconds</div></div>
    </div>

    <div class="meta">
      <div class="meta-item">
        <div class="meta-label">Next reset</div>
        <div class="meta-value" id="next-reset">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Day of cycle</div>
        <div class="meta-value" id="day-num">—</div>
      </div>
    </div>
  </main>

  <div class="footer" id="now-display">—</div>
</div>

<div class="overlay" id="overlay">
  <div class="panel">
    <h2>Reset Schedule</h2>
    <div class="field">
      <label>Reset day</label>
      <select id="set-day">
        <option value="0">Sunday</option>
        <option value="1">Monday</option>
        <option value="2">Tuesday</option>
        <option value="3" selected>Wednesday</option>
        <option value="4">Thursday</option>
        <option value="5">Friday</option>
        <option value="6">Saturday</option>
      </select>
    </div>
    <div class="field">
      <label>Reset hour (24h, local)</label>
      <input type="number" id="set-hour" min="0" max="23" value="9" />
    </div>
    <div class="field">
      <label>Reset minute</label>
      <input type="number" id="set-minute" min="0" max="59" value="0" />
    </div>
    <h2 style="margin-top:8px">Active Hours</h2>
    <div class="row">
      <div class="field">
        <label>Start</label>
        <input type="number" id="set-active-start" min="0" max="23" value="7" />
      </div>
      <div class="field">
        <label>End</label>
        <input type="number" id="set-active-end" min="1" max="24" value="23" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="toggleSettings()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
  const DEFAULTS = { day: 3, hour: 9, minute: 0, activeStart: 7, activeEnd: 23 };
  let config = loadConfig();

  function loadConfig() {
    try {
      const saved = localStorage.getItem('pacer-config');
      if (saved) return { ...DEFAULTS, ...JSON.parse(saved) };
    } catch {}
    return { ...DEFAULTS };
  }

  function saveConfig() {
    try { localStorage.setItem('pacer-config', JSON.stringify(config)); } catch {}
  }

  function getNextReset(now) {
    const next = new Date(now);
    next.setHours(config.hour, config.minute, 0, 0);
    const daysAhead = (config.day - now.getDay() + 7) % 7;
    if (daysAhead === 0 && next <= now) {
      next.setDate(next.getDate() + 7);
    } else {
      next.setDate(next.getDate() + daysAhead);
    }
    return next;
  }

  function getPrevReset(now) {
    const next = getNextReset(now);
    const prev = new Date(next);
    prev.setDate(prev.getDate() - 7);
    return prev;
  }

  // Sum of milliseconds within [start, end] that fall inside the daily
  // active window [activeStart:00, activeEnd:00) local time.
  function activeMsBetween(start, end) {
    if (end <= start) return 0;
    const aS = config.activeStart, aE = config.activeEnd;
    let total = 0;
    const cur = new Date(start);
    cur.setHours(0, 0, 0, 0);
    const endTime = end.getTime();
    while (cur.getTime() < endTime) {
      const dayStart = new Date(cur); dayStart.setHours(aS, 0, 0, 0);
      const dayEnd = new Date(cur); dayEnd.setHours(0, 0, 0, 0);
      dayEnd.setTime(dayEnd.getTime() + aE * 3600000);
      const s = Math.max(dayStart.getTime(), start.getTime());
      const e = Math.min(dayEnd.getTime(), endTime);
      if (e > s) total += e - s;
      cur.setDate(cur.getDate() + 1);
    }
    return total;
  }

  function fmtNum(n, pad = 2) {
    return String(n).padStart(pad, '0');
  }

  function fmtDate(d) {
    const opts = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    return d.toLocaleString(undefined, opts);
  }

  function inActiveWindow(d) {
    const h = d.getHours() + d.getMinutes() / 60;
    return h >= config.activeStart && h < config.activeEnd;
  }

  function tick() {
    const now = new Date();
    const next = getNextReset(now);
    const prev = getPrevReset(now);

    const totalActive = activeMsBetween(prev, next);
    const elapsedActive = activeMsBetween(prev, now);
    const pct = totalActive > 0
      ? Math.max(0, Math.min(100, (elapsedActive / totalActive) * 100))
      : 0;

    document.getElementById('pct').textContent = pct.toFixed(2);
    document.getElementById('bar').style.width = pct + '%';
    document.getElementById('active-tag').textContent =
      `(${fmtNum(config.activeStart)}:00–${fmtNum(config.activeEnd)}:00)`;

    const remaining = Math.max(0, next - now);
    const days = Math.floor(remaining / 86400000);
    const hours = Math.floor((remaining % 86400000) / 3600000);
    const mins = Math.floor((remaining % 3600000) / 60000);
    const secs = Math.floor((remaining % 60000) / 1000);

    document.getElementById('d').textContent = days;
    document.getElementById('h').textContent = fmtNum(hours);
    document.getElementById('m').textContent = fmtNum(mins);
    document.getElementById('s').textContent = fmtNum(secs);

    document.getElementById('next-reset').textContent = fmtDate(next);
    const dayInCycle = Math.floor((now - prev) / 86400000) + 1;
    const offHours = !inActiveWindow(now) ? ' • OFF-HOURS' : '';
    document.getElementById('day-num').textContent = dayInCycle + ' / 7' + offHours;

    document.getElementById('now-display').textContent =
      now.toLocaleString(undefined, { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZoneName: 'short' }).toUpperCase();
  }

  function toggleSettings() {
    const overlay = document.getElementById('overlay');
    document.getElementById('set-day').value = config.day;
    document.getElementById('set-hour').value = config.hour;
    document.getElementById('set-minute').value = config.minute;
    document.getElementById('set-active-start').value = config.activeStart;
    document.getElementById('set-active-end').value = config.activeEnd;
    overlay.classList.toggle('open');
  }

  function saveSettings() {
    config = {
      day: parseInt(document.getElementById('set-day').value),
      hour: parseInt(document.getElementById('set-hour').value),
      minute: parseInt(document.getElementById('set-minute').value),
      activeStart: parseInt(document.getElementById('set-active-start').value),
      activeEnd: parseInt(document.getElementById('set-active-end').value),
    };
    saveConfig();
    toggleSettings();
    tick();
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
